# Streamlit theme for the live dashboard.
#
# Dark theme per the reviewed colour-psychology recommendation for a fraud
# detection tool: dark navy/charcoal for seriousness and focus, electric
# blue/teal as the one accent color, crimson/amber reserved for fraud alerts.

[theme]
base = "dark"
primaryColor = "#4CC9F0"
backgroundColor = "#0B0C10"
secondaryBackgroundColor = "#1A1A2E"
textColor = "#FFFFFF"
font = "sans serif"
